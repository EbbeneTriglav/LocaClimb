<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LocaRide - ride like a local</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
:root{--bg:#f8fafc;--bg2:#fff;--txt:#1e293b;--txt2:#64748b;--ac:#2563eb;--bdr:#e2e8f0;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
.dark{--bg:#0f172a;--bg2:#1e293b;--txt:#f1f5f9;--txt2:#94a3b8;--bdr:#334155}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt)}
#hdr{height:56px;background:var(--bg2);display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--bdr);position:relative;z-index:1000}
#hdr h1{font-size:1.1rem;color:var(--ac);cursor:pointer;white-space:nowrap}
#hdr h1 span{font-weight:300;color:var(--txt2);font-size:.8rem}
#search{flex:1;max-width:280px;padding:7px 14px;border:1px solid var(--bdr);border-radius:20px;background:var(--bg);color:var(--txt);font-size:.9rem;outline:none}
#search:focus{border-color:var(--ac)}
.btn{padding:5px 10px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg);color:var(--txt);cursor:pointer;font-size:.85rem}
.btn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.active{background:var(--ok);color:#fff;border-color:var(--ok)}
#map{position:absolute;top:56px;left:0;right:0;bottom:0;z-index:1}
#fp{position:fixed;top:56px;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--bdr);padding:16px;overflow-y:auto;transform:translateX(-100%);transition:transform .3s;z-index:999}
#fp.open{transform:translateX(0)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:4px}
.fg select,.fg input[type=range]{width:100%;padding:5px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg);color:var(--txt)}
#dp{position:fixed;top:0;right:0;bottom:0;width:520px;background:var(--bg2);overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;z-index:1001;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
#dp.open{transform:translateX(0)}
.dp-hdr{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:20px}
.dp-body{padding:16px}
.section-title{font-size:.95rem;font-weight:700;margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--ac);color:var(--ac)}
.vtable{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:6px}
.vtable th,.vtable td{padding:7px 5px;text-align:center;border-bottom:1px solid var(--bdr)}
.vtable th{background:var(--bg);font-weight:600;font-size:.78rem}
.vtable td:first-child{text-align:left;font-weight:500}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:6px 0}
.wcard{text-align:center;padding:8px 3px;border-radius:10px;background:var(--bg);border:1px solid var(--bdr)}
.wcard.best{border:2px solid var(--ok);background:rgba(34,197,94,.06)}
.dark .wcard.best{background:rgba(34,197,94,.1)}
.alert-wind{padding:10px 14px;border-radius:10px;margin:8px 0;font-size:.85rem}
.alert-wind.wb{background:rgba(245,158,11,.12);border:1px solid var(--warn);color:#92400e}
.alert-wind.eb{background:rgba(239,68,68,.12);border:1px solid var(--err);color:#991b1b}
.dark .alert-wind.wb{color:#fcd34d}.dark .alert-wind.eb{color:#fca5a5}
.evt-card{padding:10px 12px;background:var(--bg);border-radius:8px;margin:5px 0;border-left:3px solid var(--ac);font-size:.85rem}
.sun-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.8rem;background:rgba(245,158,11,.12);color:#854d0e}
.dark .sun-badge{background:rgba(245,158,11,.2);color:#fcd34d}
.osm-badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.7rem;background:rgba(124,58,237,.12);color:#7c3aed;font-weight:600}
.dark .osm-badge{background:rgba(124,58,237,.25);color:#c4b5fd}
canvas#elev,canvas#relev{width:100%;height:200px;display:block;border-radius:8px;margin:6px 0}
canvas#relev{height:170px}
.surf-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;margin:8px 0 4px;border:1px solid var(--bdr)}
.surf-seg{height:100%}
.surf-leg{display:flex;flex-wrap:wrap;gap:10px;font-size:.74rem;color:var(--txt2);margin-bottom:6px}
.surf-leg span{display:inline-flex;align-items:center;gap:5px}
.surf-dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.rstats{display:flex;gap:16px;flex-wrap:wrap;font-size:.86rem;margin:8px 0}
.rstats div b{display:block;color:var(--ac);font-size:1.15rem}
.rstop{display:flex;align-items:center;gap:8px;font-size:.84rem;padding:5px 0;border-bottom:1px solid var(--bdr)}
.rstop .n{flex:none;width:22px;height:22px;border-radius:50%;background:#7c3aed;color:#fff;text-align:center;line-height:22px;font-size:.72rem;font-weight:700}
.wp-ic{background:#7c3aed;color:#fff;border-radius:50%;width:26px;height:26px;line-height:22px;text-align:center;font-size:.75rem;font-weight:700;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);cursor:grab}
.wordmark{font-weight:400;font-size:1.18rem;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.2px}
.wordmark b{font-weight:900}
.cat-pill.grv{background-image:repeating-linear-gradient(45deg,rgba(229,231,235,.75) 0 3px,transparent 3px 8px),linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.12))!important}
.cat-pill{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.55);border-radius:8px;height:26px;min-width:32px;padding:0 7px;line-height:24px;text-align:center;font-size:.92rem;font-weight:900;letter-spacing:.3px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.35);background-image:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.12))}
.etog{padding:4px 9px;border:1px solid var(--bdr);border-radius:7px;background:var(--bg);color:var(--txt2);font-size:.76rem;cursor:pointer}
.etog.active{background:var(--ac);color:#fff;border-color:var(--ac)}
#be-btn{position:fixed;bottom:20px;left:20px;z-index:998;padding:10px 16px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:24px;cursor:pointer;font-size:.85rem;font-weight:600;box-shadow:0 4px 12px rgba(37,99,235,.3)}
#be-panel{position:fixed;bottom:68px;left:20px;width:300px;max-height:380px;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.1);overflow-y:auto;padding:14px;z-index:998;display:none}
#rb{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--ac);padding:12px 16px;z-index:1000;transform:translateY(100%);transition:transform .3s}
#rb.open{transform:translateY(0)}
#rb h4{margin:0 0 8px;font-size:.9rem}
.rb-list{display:flex;gap:6px;overflow-x:auto;padding:4px 0;min-height:32px}
.rb-item{padding:5px 10px;background:var(--ac);color:#fff;border-radius:16px;font-size:.8rem;white-space:nowrap;display:flex;align-items:center;gap:5px}
.rb-item.pt{background:#7c3aed}
.rb-item .rm{cursor:pointer;opacity:.7;font-weight:700}
.rb-item .rm:hover{opacity:1}
.rb-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.rb-btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.82rem;color:#fff}
.rb-btn.go{background:var(--ok)}.rb-btn.gpx{background:#7c3aed}.rb-btn.rst{background:var(--err)}
.rb-btn:disabled{opacity:.4;cursor:default}
#rb-hint{font-size:.78rem;color:var(--txt2);margin-top:4px}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center}
#modal.open{display:flex}
.modal-box{background:var(--bg2);border-radius:16px;padding:24px;max-width:400px;width:90%;color:var(--txt)}
.modal-box h3{margin:0 0 14px}
.modal-box textarea,.modal-box input,.modal-box select{width:100%;padding:8px;margin:3px 0 10px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg);color:var(--txt);font-size:.9rem}
.modal-box textarea{resize:vertical;min-height:80px}
.route-status{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--ac);color:#fff;padding:6px 16px;border-radius:20px;font-size:.82rem;z-index:999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.route-status.show{display:block}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(37,99,235,.15)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(37,99,235,.6)!important;color:#fff!important;font-weight:600}
@media(max-width:640px){#dp{width:100%}.wgrid{grid-template-columns:repeat(4,1fr)}#hdr h1 span{display:none}.rb-list{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="hdr">
<h1 onclick="map.setView([45.8,10.5],7)" style="display:flex;align-items:center;gap:7px;cursor:pointer"><svg width="28" height="28" viewBox="0 0 32 32"><defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><path d="M2 26 L12 8 L18 18 L22 12 L30 26 Z" fill="url(#lg1)"/><path d="M4 26 Q12 22 16 26 T28 26" stroke="#f59e0b" stroke-width="2.4" fill="none" stroke-linecap="round"/><circle cx="12" cy="8" r="2.2" fill="#fff"/></svg><span class="wordmark">Loca<b>Ride</b></span> <span>&#x2014; ride like a local</span></h1>
<input type="text" id="search" placeholder="Cerca passo..." autocomplete="off">
<button class="btn" id="fb" title="Filtri">&#x2630;</button>
<button class="btn" id="rbb" title="Route Builder">&#x1F6A9;</button>
<button class="btn" id="ob" title="Carica passi da OpenStreetMap">OSM</button>
<button class="btn" id="tb" title="Heatmap traffico">&#x1F525;</button>
<button class="btn" id="db" title="Tema scuro">&#x1F319;</button>
</div>
<div id="fp">
<h3 style="margin-bottom:14px">Filtri</h3>
<div class="fg"><label>Regione</label><select id="fr"><option value="">Tutte</option></select></div>
<div class="fg"><label>Difficolta min</label><input type="range" id="fd" min="1" max="10" value="1"><div style="font-size:.8rem;color:var(--txt2)">Da <b id="fdv">1</b> a 10</div></div>
<div class="fg"><label>Stato</label><select id="fs"><option value="">Tutti</option><option value="open">Aperto</option><option value="seasonal">Stagionale</option><option value="closed">Chiuso</option></select></div>
<div class="fg"><label><input type="checkbox" id="fosm" checked style="width:auto;margin-right:6px">Mostra passi OSM</label></div>
<button class="btn" style="width:100%;margin-top:6px" onclick="resetFilters()">Reset</button>
<button class="btn" style="width:100%;margin-top:4px" onclick="closeFP()">Chiudi</button>
</div>
<div id="dp"></div>
<div id="rb">
<h4>&#x1F6A9; Route Builder <span style="font-weight:400;font-size:.8em;color:var(--txt2)">- clicca i passi o la mappa per aggiungere punti</span></h4>
<div class="rb-list" id="rb-list"><span style="color:var(--txt2);font-size:.85rem">Clicca sui passi o sulla mappa...</span></div>
<div class="rb-actions">
<select id="rb-surf" title="Preferenza fondo" style="padding:6px 8px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);color:var(--txt);font-size:.82rem"><option value="trekking">Misto (gravel ok)</option><option value="fastbike">Solo asfalto</option><option value="shortest">Piu corto</option></select>
<button class="rb-btn go" id="rb-go" onclick="calcRoute()" disabled>Calcola Percorso</button>
<button class="rb-btn gpx" id="rb-gpx" onclick="downloadGPX()" disabled>Scarica GPX</button>
<button class="rb-btn rst" onclick="resetRoute()">Reset</button>
<span id="rb-info" style="font-size:.8rem;color:var(--txt2);align-self:center"></span>
</div>
<div id="rb-hint">&#x1F4A1; In modalita percorso, un clic sulla mappa aggiunge un waypoint libero (non solo passi).</div>
</div>
<div id="modal">
<div class="modal-box">
<h3>&#x1F4DD; Segnala informazione</h3>
<input type="hidden" id="rp-id">
<div class="fg"><label>Categoria</label><select id="rp-cat"><option>Stato strada</option><option>Traffico</option><option>Chiusura</option><option>Consiglio</option><option>Errore dati</option></select></div>
<div class="fg"><label>La tua segnalazione</label><textarea id="rp-txt" placeholder="Descrivi..."></textarea></div>
<div class="fg"><label>Il tuo nome (opzionale)</label><input type="text" id="rp-name" placeholder="Ciclista anonimo"></div>
<div id="rp-msg" style="display:none;padding:10px;border-radius:8px;background:rgba(34,197,94,.1);color:var(--ok);margin-bottom:10px;text-align:center;font-weight:600"></div>
<div style="display:flex;gap:8px">
<button class="rb-btn go" onclick="submitReport()" style="flex:1" id="rp-sub">Invia</button>
<button class="rb-btn rst" onclick="closeModal()" style="flex:1">Annulla</button>
</div>
</div>
</div>
<div class="route-status" id="rs">Caricamento tracciato stradale...</div>
<button id="be-btn" onclick="toggleBE()">&#x1F6B4; Bike Day</button>
<div id="be-panel"></div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>
<script src="passes_data.js"></script>
<script>
var map,markers,routeLines=[],weatherCache={},routeCache={};
var rbMode=false,rbStops=[],rbLine=null,rbTrack=[],wpMarkers=[];
var osmPasses=[],osmEnrichCache={},showOsm=true;
var OVERPASS="https://overpass-api.de/api/interpreter";
var ELEV_API="https://api.open-meteo.com/v1/elevation";
var BROUTER="https://brouter.de/brouter";
var OSM_CACHE_KEY="locaclimb_osm_v1";
var DAYS=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
var VCOLS=["#2563eb","#f59e0b","#10b981"];
var SURF_COLORS={"asfalto":"#2563eb","sterrato":"#f59e0b","fondo naturale":"#b45309","altro":"#94a3b8"};
var heatLayer=null,heatOn=false;
/* known Strava segment IDs per pass (passId -> {side label: segmentId}) */
var STRAVA_SEGMENTS={stelvio:{"Prato allo Stelvio":614103,"Bormio":614115},gavia:{"Ponte di Legno":1084024},mortirolo:{"Mazzo di Valtellina":617404},zoncolan:{"Ovaro":1253584}};
/* regions where weekend/summer car+moto traffic spikes (tourism) */
var TOURIST_REG={"Trentino-Alto Adige":1,"Veneto":1,"Veneto/Trentino":1,"Lombardia/Trentino":1};
var WC={0:"&#x2600;&#xFE0F;",1:"&#x1F324;&#xFE0F;",2:"&#x26C5;",3:"&#x2601;&#xFE0F;",45:"&#x1F32B;&#xFE0F;",48:"&#x1F32B;&#xFE0F;",51:"&#x1F326;&#xFE0F;",53:"&#x1F326;&#xFE0F;",55:"&#x1F327;&#xFE0F;",61:"&#x1F327;&#xFE0F;",63:"&#x1F327;&#xFE0F;",65:"&#x1F327;&#xFE0F;",71:"&#x1F328;&#xFE0F;",73:"&#x1F328;&#xFE0F;",75:"&#x1F328;&#xFE0F;",80:"&#x1F326;&#xFE0F;",81:"&#x1F327;&#xFE0F;",82:"&#x1F327;&#xFE0F;",95:"&#x26C8;&#xFE0F;",96:"&#x26C8;&#xFE0F;",99:"&#x26C8;&#xFE0F;"};
function we(c){return WC[c]||"&#x2601;&#xFE0F;";}
function sc(s){return s==="open"?"#22c55e":s==="seasonal"?"#f59e0b":"#ef4444";}
function sl(s){return s==="open"?"&#x1F7E2; Aperto":s==="seasonal"?"&#x1F7E1; Stagionale":"&#x1F534; Chiuso";}
function ds(d){var s="";for(var i=0;i<10;i++)s+=(i<d?"&#x2605;":"&#x2606;");return s;}
function diffColor(d){return d>=9?"#ef4444":d>=7?"#f97316":d>=5?"#f59e0b":"#22c55e";}
/* gradient (%) -> color scale, used by profile + map track */
function gradeColor(g){g=Math.abs(g);return g>=13?"#7f1d1d":g>=10?"#ef4444":g>=7?"#f97316":g>=4?"#f59e0b":"#22c55e";}
/* climb category (HC/1/2/3/4) color + pill */
function ensureCat(p){
  if(p.cat||!p.versanti||!p.versanti.length)return;
  var best=null,rank={HC:5,"1":4,"2":3,"3":2,"4":1};
  p.versanti.forEach(function(v){
    var gain=(v.endElevation||0)-(v.startElevation||0),d=v.distance_km||0;
    if(gain<150||d<1)return;
    var f=gain*gain/(d*1000*10)+Math.max(0,(v.endElevation||0)-1000)/1000;
    var c=f>=8?"HC":f>=5.5?"1":f>=3.5?"2":f>=2?"3":"4";
    if(!best||rank[c]>rank[best])best=c;
  });
  if(best)p.cat=best;
}
function isGravel(p){return (p.surfaceLabel||"").indexOf("Sterrato")>=0;}
function catColor(c){return {HC:"#7f1d1d","1":"#dc2626","2":"#ea580c","3":"#d97706","4":"#65a30d"}[c]||"#64748b";}
function catLabel(c){return c==="HC"?"HC":c;}
function loadCuratedOverrides(){fetch("curated_overrides.json",{cache:"no-cache"}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(o){PASSES_DATA.forEach(function(p){var ov=o[p.id];if(ov){if(ov.lat){p.lat=ov.lat;p.lon=ov.lon;}if(ov.versanti&&ov.versanti.length)p.versanti=ov.versanti;if(ov.difficulty)p.difficulty=ov.difficulty;if(ov.cat)p.cat=ov.cat;}});applyFilters();}).catch(function(){});}
/* ===== TRAFFIC MODEL ===== */
var TRAF_MAP={basso:2,medio:5,alto:8};
function trafColor(s){return s>=7?"#ef4444":s>=4?"#f59e0b":"#22c55e";}
/* returns {fer,wkd,trucks} for a versante; OSM passes carry baked scores at pass level */
function versTraffic(v,p){
  if(typeof v.trafFeriale==="number")return{fer:v.trafFeriale,wkd:v.trafWeekend,trucks:v.trucks||"rari"};
  if(p&&typeof p.trafFeriale==="number")return{fer:p.trafFeriale,wkd:p.trafWeekend,trucks:p.trucks||"rari"};
  var base=TRAF_MAP[v.traffic]||4;
  var tour=p&&TOURIST_REG[p.region]?2:1;
  var trucks=(p&&p.elevation>=1900)?"rari":(v.traffic==="alto"?"possibili":"rari");
  return{fer:base,wkd:Math.min(10,base+tour),trucks:trucks};
}
function trafBar(s){return'<div style="display:flex;align-items:center;gap:4px;justify-content:center"><div style="width:46px;height:7px;border-radius:4px;background:var(--bdr);overflow:hidden"><div style="width:'+(s*10)+'%;height:100%;background:'+trafColor(s)+'"></div></div><span style="font-size:.72em;color:var(--txt2)">'+s+'</span></div>';}
function truckBadge(t){var m={no:["&#x1F6AB; No camion","#22c55e"],rari:["&#x1F69A; Camion rari","#64748b"],possibili:["&#x1F69B; Possibili camion","#f59e0b"],si:["&#x1F69B; Camion frequenti","#ef4444"]};var x=m[t]||m.rari;return'<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:.74em;font-weight:600;color:#fff;background:'+x[1]+'">'+x[0]+'</span>';}
function stravaSection(p){
  var seg=STRAVA_SEGMENTS[p.id];var h='<div class="section-title">&#x1F3C6; Strava</div>';
  if(seg){Object.keys(seg).forEach(function(side){h+='<a href="https://www.strava.com/segments/'+seg[side]+'" target="_blank" class="btn" style="display:inline-block;text-decoration:none;margin:2px;background:#fc4c02;color:#fff;border-color:#fc4c02">'+side+' &#x2197;&#xFE0F;</a>';});}
  h+='<a href="https://www.strava.com/segments/explore?bounds='+(p.lat-0.05)+','+(p.lon-0.05)+','+(p.lat+0.05)+','+(p.lon+0.05)+'" target="_blank" class="btn" style="display:inline-block;text-decoration:none;margin:2px">&#x1F50D; Cerca segmenti</a>';
  return h;
}

/* ===== GEO HELPERS ===== */
function hav(la1,lo1,la2,lo2){var R=6371,p=Math.PI/180;var dLa=(la2-la1)*p,dLo=(lo2-lo1)*p;var x=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*p)*Math.cos(la2*p)*Math.sin(dLo/2)*Math.sin(dLo/2);return 2*R*Math.asin(Math.sqrt(x));}
function compass(la1,lo1,la2,lo2){var p=Math.PI/180;var y=Math.sin((lo2-lo1)*p)*Math.cos(la2*p);var x=Math.cos(la1*p)*Math.sin(la2*p)-Math.sin(la1*p)*Math.cos(la2*p)*Math.cos((lo2-lo1)*p);var br=(Math.atan2(y,x)*180/Math.PI+360)%360;var d=["Nord","Nord-Est","Est","Sud-Est","Sud","Sud-Ovest","Ovest","Nord-Ovest"];return d[Math.round(br/45)%8];}
function estDiff(distKm,gain,top){if(!distKm||distKm<=0)return 1;var avg=gain/(distKm*10);var d=avg*0.85;d+=Math.min(distKm/6,2.5);if(avg>=12)d+=2;else if(avg>=9)d+=1;if(top>=2000)d+=1;return Math.max(1,Math.min(10,Math.round(d)));}

function calcSun(lat,lon,exp){
  if(typeof SunCalc==="undefined")return"N/D";
  var dirs={"Nord":[315,45],"Nord-Est":[0,90],"Est":[45,135],"Sud-Est":[90,180],"Sud":[135,225],"Sud-Ovest":[180,270],"Ovest":[225,315],"Nord-Ovest":[270,360]};
  var r=dirs[exp];if(!r)return"N/D";
  var today=new Date(),st=-1,en=-1;
  for(var h=5;h<=21;h++){var dt=new Date(today.getFullYear(),today.getMonth(),today.getDate(),h,0,0);var pos=SunCalc.getPosition(dt,lat,lon);if(pos.altitude<=0)continue;var az=(pos.azimuth*180/Math.PI+180)%360;var ok=false;if(r[0]>r[1])ok=(az>=r[0]||az<=r[1]);else ok=(az>=r[0]&&az<=r[1]);if(ok){if(st<0)st=h;en=h;}}
  if(st<0)return"&#x1F311; In ombra";return"&#x2600;&#xFE0F; "+st+":00-"+en+":00";
}

  L.control.zoom({position:"topright"}).addTo(map);

/* ===== OSRM ROAD ROUTING FOR CURATED VERSANTI ===== */
function fetchVersanteRoute(v,p,colorIdx){
  var key=v.startLat+","+v.startLon+">"+p.lat+","+p.lon;
  if(routeCache[key]){
    var line=L.polyline(routeCache[key],{color:VCOLS[colorIdx],weight:5,opacity:0.85});
    line.addTo(map);routeLines.push(line);
    return Promise.resolve(line);
  }
  var url="https://router.project-osrm.org/route/v1/bike/"+v.startLon+","+v.startLat+";"+p.lon+","+p.lat+"?overview=full&geometries=geojson";
  return fetch(url).then(function(r){return r.json();}).then(function(data){
    if(!data.routes||!data.routes.length)throw new Error("no route");
    var coords=data.routes[0].geometry.coordinates.map(function(c){return[c[1],c[0]];});
    routeCache[key]=coords;
    var line=L.polyline(coords,{color:VCOLS[colorIdx],weight:5,opacity:0.85});
    line.addTo(map);routeLines.push(line);
    return line;
  }).catch(function(){
    var coords=[[v.startLat,v.startLon],[p.lat,p.lon]];
    var line=L.polyline(coords,{color:VCOLS[colorIdx],weight:3,opacity:0.5,dashArray:"8,8"});
    line.addTo(map);routeLines.push(line);
    return line;
  });
}

/* ===== CURATED PASS DETAIL ===== */
function openD(id){
  var p=getCurated(id);if(!p)return;
  map.closePopup();clearRoutes();
  showRS("Caricamento tracciati stradali...");
  var promises=p.versanti.map(function(v,i){return fetchVersanteRoute(v,p,i);});
  Promise.all(promises).then(function(){
    hideRS();
    if(routeLines.length>0)map.fitBounds(L.featureGroup(routeLines).getBounds().pad(0.15),{maxZoom:13});
    else map.setView([p.lat,p.lon],11);
  });
  renderPassPanel(p,false);
}

  h+='</div><button onclick="closeD()" style="background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.3em;cursor:pointer;border-radius:8px;padding:4px 10px">&#x2715;</button></div></div>';
  h+='<div class="dp-body"><div id="osm-enr" style="padding:12px;color:var(--txt2);font-size:.88rem">&#x2139;&#xFE0F; Dati salita non ancora disponibili per questo passo. Verranno calcolati al prossimo aggiornamento dati (GitHub Action).</div>';

function drawOsmTracks(op){
  clearRoutes();var lines=[];
  (op.versanti||[]).forEach(function(v,i){
    if(!v.track||v.track.length<2)return;
    var pr=v.elevationProfile||[],np=pr.length,nt=v.track.length;
    for(var t=1;t<nt;t++){
      var g=0;
      if(np>1){var fi=(t/(nt-1))*(np-1),lo=Math.floor(fi);if(lo>=np-1)lo=np-2;var seg=(v.distance_km*1000)/(np-1);g=(pr[lo+1]-pr[lo])/seg*100;}
      var ln=L.polyline([v.track[t-1],v.track[t]],{color:gradeColor(g),weight:6,opacity:0.9});
      ln.addTo(map);routeLines.push(ln);lines.push(ln);
    }
  });
  if(lines.length)map.fitBounds(L.featureGroup(lines).getBounds().pad(0.15),{maxZoom:13});
  else map.setView([op.lat,op.lon],12);
}

/* derive climb data for an OSM pass: connected highways -> walk outward -> elevation -> versanti */
function enrichOsmPass(op){
  if(op.versanti&&op.versanti.length)return Promise.resolve(true);
  if(osmEnrichCache[op.id]){op.versanti=osmEnrichCache[op.id].versanti;op.difficulty=osmEnrichCache[op.id].difficulty;op.surfaceLabel=osmEnrichCache[op.id].surfaceLabel;return Promise.resolve(true);}
  var nid=(""+op.id).replace(/^osm-/,"");
  if(!/^\d+$/.test(nid))return Promise.resolve(false);
  var q="[out:json][timeout:25];node("+nid+")->.n;way(bn.n)[\"highway\"];out geom tags;";
  return fetch(OVERPASS+"?data="+encodeURIComponent(q)).then(function(r){return r.json();}).then(function(data){
    var ways=(data.elements||[]).filter(function(e){return e.type==="way"&&e.geometry&&e.geometry.length>2&&rideableWay(e.tags);});
    if(!ways.length)return false;
    // pick the way whose geometry passes closest to the summit and is longest
    var best=null,bestLen=0;
    ways.forEach(function(w){var idx=closestIdx(w.geometry,op.lat,op.lon);if(idx<0)return;var len=w.geometry.length;if(len>bestLen){bestLen=len;best={w:w,idx:idx};}});
    if(!best)return false;
    var w=best.w,idx=best.idx;
    var sideA=collectSide(w.geometry,idx,-1);
    var sideB=collectSide(w.geometry,idx,1);
    var sides=[sideA,sideB].filter(function(s){return s&&s.length>=4;});
    if(!sides.length)return false;
    var surfLabel=surfaceLabelFromWay(w.tags);
    return Promise.all(sides.map(function(pts){return fetchElevs(pts).then(function(ev){return buildVersante(pts,ev,op.lat,op.lon,surfLabel,w.tags);}).catch(function(){return null;});}))
      .then(function(vs){
        vs=vs.filter(function(v){return v;});
        if(!vs.length)return false;
        // dedupe near-identical sides, keep up to 2
        vs.sort(function(a,b){return b.distance_km-a.distance_km;});vs=vs.slice(0,2);
        op.versanti=vs;
        op.difficulty=Math.max.apply(null,vs.map(function(v){return estDiff(v.distance_km,v.endElevation-v.startElevation,v.endElevation);}));
        op.surfaceLabel=surfLabel;
        osmEnrichCache[op.id]={versanti:vs,difficulty:op.difficulty,surfaceLabel:surfLabel};
        return true;
      });
  }).catch(function(){return false;});
}
function rideableWay(t){if(!t||!t.highway)return false;var bad={motorway:1,motorway_link:1,path:1,footway:1,steps:1,pedestrian:1,bridleway:1,raceway:1,construction:1,proposed:1};if(bad[t.highway])return false;if(t.motorroad==="yes")return false;if(t.bicycle==="no")return false;if(t.access==="private"||t.access==="no")return false;if(t["mtb:scale"])return false;return true;}
function closestIdx(geom,lat,lon){var bi=-1,bd=1e9;for(var i=0;i<geom.length;i++){var d=hav(lat,lon,geom[i].lat,geom[i].lon);if(d<bd){bd=d;bi=i;}}return bd<0.4?bi:-1;}
function collectSide(geom,idx,dir){
  var pts=[],dist=0,prev=geom[idx];pts.push({lat:geom[idx].lat,lon:geom[idx].lon});
  for(var i=idx+dir;i>=0&&i<geom.length;i+=dir){var g=geom[i];dist+=hav(prev.lat,prev.lon,g.lat,g.lon);pts.push({lat:g.lat,lon:g.lon});prev=g;if(dist>=16)break;}
  if(pts.length>80){var out=[],n=80;for(var k=0;k<n;k++)out.push(pts[Math.round(k*(pts.length-1)/(n-1))]);return out;}
  return pts;
}
function fetchElevs(pts){
  var la=pts.map(function(p){return p.lat.toFixed(5);}).join(",");
  var lo=pts.map(function(p){return p.lon.toFixed(5);}).join(",");
  return fetch(ELEV_API+"?latitude="+la+"&longitude="+lo).then(function(r){return r.json();}).then(function(d){return d.elevation;});
}
function buildVersante(pts,elevs,topLat,topLon,surfLabel,wtags){
  if(!elevs||elevs.length!==pts.length)return null;
  var bi=0;for(var i=1;i<elevs.length;i++){if(elevs[i]<elevs[bi])bi=i;}
  if(bi<2)return null;

var elevMeta=null,elevSel=-1;
function setElev(i){elevSel=i;var btns=document.querySelectorAll("#elev-tog .etog");for(var k=0;k<btns.length;k++)btns[k].classList.toggle("active",k===(i<0?0:i+1));renderElev(-1);}
function drawElev(p){
  var c=document.getElementById("elev");if(!c)return;
  elevSel=-1;
  // pick the versante to detail on hover: longest by default
  var vers=(p.versanti||[]).filter(function(v){return v.elevationProfile&&v.elevationProfile.length>1;});
  if(!vers.length)return;
  var allE=[];vers.forEach(function(v){allE=allE.concat(v.elevationProfile);});
  var mn=Math.min.apply(null,allE)-50,mx=Math.max.apply(null,allE)+50;
  var maxDist=Math.max.apply(null,vers.map(function(v){return v.distance_km||10;}));
  var series=vers.map(function(v){
    var pr=v.elevationProfile,n=pr.length,dist=v.distance_km||10,seg=(dist*1000)/(n-1);
    var pts=[];for(var i=0;i<n;i++){var g=i===0?0:(pr[i]-pr[i-1])/seg*100;pts.push({d:i/(n-1)*dist,e:pr[i],g:g});}
    return {name:v.side,dist:dist,pts:pts};
  });
  elevMeta={c:c,mn:mn,mx:mx,maxDist:maxDist,series:series};
  renderElev(-1);
  c.onmousemove=function(ev){var r=c.getBoundingClientRect();renderElev((ev.clientX-r.left)/r.width);};
  c.onmouseleave=function(){renderElev(-1);};
  c.ontouchmove=function(ev){var r=c.getBoundingClientRect();renderElev((ev.touches[0].clientX-r.left)/r.width);ev.preventDefault();};
}
function renderElev(frac){

  var dk=document.body.classList.contains("dark"),PADL=40,PADR=10,PADT=14,PADB=22;

  function Y(e){return PADT+plotH*(1-(e-m.mn)/(m.mx-m.mn));}
  // grid + axes

  for(var i=0;i<=4;i++){var y=PADT+plotH*(1-i/4),el=Math.round(m.mn+(m.mx-m.mn)*i/4);ctx.beginPath();ctx.moveTo(PADL,y);ctx.lineTo(W-PADR,y);ctx.stroke();ctx.fillText(el+"m",PADL-4,y+3);}
  ctx.textAlign="center";for(var k=0;k<=Math.ceil(m.maxDist);k+=Math.max(1,Math.round(m.maxDist/6))){ctx.fillText(k+"km",X(k),H-7);}

    for(var i=1;i<s.pts.length;i++){var a=s.pts[i-1],b=s.pts[i];
      if(fill){ctx.beginPath();ctx.moveTo(X(a.d),Y(a.e));ctx.lineTo(X(b.d),Y(b.e));ctx.lineTo(X(b.d),H-PADB);ctx.lineTo(X(a.d),H-PADB);ctx.closePath();ctx.fillStyle=gradeColor(b.g);ctx.globalAlpha=0.6;ctx.fill();ctx.globalAlpha=1;}
      ctx.beginPath();ctx.moveTo(X(a.d),Y(a.e));ctx.lineTo(X(b.d),Y(b.e));ctx.strokeStyle=fill?(dk?"#e2e8f0":"#334155"):gradeColor(b.g);ctx.lineWidth=fill?1.5:3.5;ctx.globalAlpha=0.95;ctx.stroke();ctx.globalAlpha=1;}
  });

  // hover crosshair + tooltip on primary series
  if(frac>=0&&m.series.length){
    var s=only>=0?m.series[only]:m.series[0],d=Math.max(0,Math.min(s.dist,(frac*W-PADL)/plotW*m.maxDist));
    var idx=Math.round(d/s.dist*(s.pts.length-1));idx=Math.max(0,Math.min(s.pts.length-1,idx));var pt=s.pts[idx];

    ctx.fillStyle=gradeColor(pt.g);ctx.beginPath();ctx.arc(px,py,4,0,7);ctx.fill();
    var txt=pt.d.toFixed(1)+"km  "+pt.e+"m  "+(pt.g>0?"+":"")+pt.g.toFixed(1)+"%";
    ctx.font="bold 11px system-ui";var tw=ctx.measureText(txt).width+12,tx=Math.min(W-tw-2,Math.max(2,px-tw/2));
    ctx.fillStyle=dk?"#0f172a":"#fff";ctx.strokeStyle=gradeColor(pt.g);ctx.lineWidth=1.5;ctx.beginPath();ctx.rect(tx,PADT+2,tw,18);ctx.fill();ctx.stroke();
    ctx.fillStyle=dk?"#f1f5f9":"#1e293b";ctx.textAlign="left";ctx.fillText(txt,tx+6,PADT+15);
  }
}
function fetchW(lat,lon){

function toggleRB(){rbMode=!rbMode;document.getElementById("rb").classList.toggle("open",rbMode);document.getElementById("rbb").classList.toggle("active",rbMode);if(rbMode){document.getElementById("be-btn").style.display="none";}else{document.getElementById("be-btn").style.display="";resetRoute();}}

function drawWpMarkers(){

function calcRoute(){
  if(rbStops.length<2)return;
  var lonlats=rbStops.map(function(s){return s.lon.toFixed(5)+","+s.lat.toFixed(5);}).join("|");
  document.getElementById("rb-go").textContent="Calcolo...";document.getElementById("rb-go").disabled=true;
  showRS("Calcolo percorso ciclabile (Brouter)...");
  var prof=(document.getElementById("rb-surf")&&document.getElementById("rb-surf").value)||"trekking";
  fetch(BROUTER+"?lonlats="+lonlats+"&profile="+prof+"&alternativeidx=0&format=geojson")
  .then(function(r){return r.json();}).then(function(data){
    var f=data.features&&data.features[0];if(!f)throw new Error("no route");
    var coords=f.geometry.coordinates;
    rbTrack=coords.map(function(c){return[c[1],c[0],c[2]];});
    drawRouteLine();
    var props=f.properties||{};
    var distKm=props["track-length"]?(props["track-length"]/1000):trackDist(rbTrack);
    var asc=props["filtered ascend"]?parseInt(props["filtered ascend"]):trackAscent(rbTrack);
    var surf=surfaceFromMessages(props.messages);
    finishRoute(distKm,asc,surf,true);
  }).catch(function(){
    // fallback OSRM (geometry only) + open-meteo elevation
    osrmFallback();
  });
}
function osrmFallback(){
  var coords=rbStops.map(function(s){return s.lon+","+s.lat;}).join(";");
  fetch("https://router.project-osrm.org/route/v1/bike/"+coords+"?overview=full&geometries=geojson")
  .then(function(r){return r.json();}).then(function(data){
    if(data.code!=="Ok"||!data.routes||!data.routes.length)throw new Error("no route");
    var route=data.routes[0];var ll=route.geometry.coordinates.map(function(c){return[c[1],c[0]];});
    rbTrack=ll.map(function(c){return[c[0],c[1],null];});
    drawRouteLine();
    // sample elevation via open-meteo (max 100 pts per call)
    var samp=[];var n=Math.min(ll.length,100);for(var i=0;i<n;i++)samp.push({lat:ll[Math.round(i*(ll.length-1)/(n-1))][0],lon:ll[Math.round(i*(ll.length-1)/(n-1))][1]});
    fetchElevs(samp).then(function(ev){for(var i=0;i<n;i++){rbTrack[Math.round(i*(ll.length-1)/(n-1))][2]=ev[i];}interp(rbTrack);finishRoute(route.distance/1000,trackAscent(rbTrack),null,false);})
    .catch(function(){finishRoute(route.distance/1000,0,null,false);});
  }).catch(function(){
    hideRS();document.getElementById("rb-info").textContent="Percorso non trovato";document.getElementById("rb-go").textContent="Calcola Percorso";document.getElementById("rb-go").disabled=false;
  });
}
function drawRouteLine(){if(rbLine)map.removeLayer(rbLine);rbLine=L.polyline(rbTrack.map(function(c){return[c[0],c[1]];}),{color:"#22c55e",weight:6,opacity:0.85});rbLine.addTo(map);map.fitBounds(rbLine.getBounds().pad(0.12));}
function trackDist(t){var d=0;for(var i=1;i<t.length;i++)d+=hav(t[i-1][0],t[i-1][1],t[i][0],t[i][1]);return d;}
function trackAscent(t){var a=0;for(var i=1;i<t.length;i++){if(t[i][2]!=null&&t[i-1][2]!=null){var dv=t[i][2]-t[i-1][2];if(dv>0)a+=dv;}}return Math.round(a);}
function interp(t){var last=null;for(var i=0;i<t.length;i++){if(t[i][2]!=null)last=t[i][2];else t[i][2]=last;}var next=null;for(var i=t.length-1;i>=0;i--){if(t[i][2]!=null)next=t[i][2];else t[i][2]=next;}}
function finishRoute(distKm,asc,surf,hasSurf){
  hideRS();
  document.getElementById("rb-go").textContent="Calcola Percorso";document.getElementById("rb-go").disabled=false;document.getElementById("rb-gpx").disabled=false;
  document.getElementById("rb-info").innerHTML="&#x1F4CD; "+distKm.toFixed(1)+" km &middot; &#x2197;&#xFE0F; "+asc+" m";

function surfaceFromMessages(msgs){
  if(!msgs||msgs.length<2)return null;
  var head=msgs[0];var di=head.indexOf("Distance"),wi=head.indexOf("WayTags");
  if(wi<0)return null;
  var acc={},total=0;
  for(var i=1;i<msgs.length;i++){var row=msgs[i];var d=parseFloat(row[di])||0;var cat=surfCat(row[wi]||"");acc[cat]=(acc[cat]||0)+d;total+=d;}
  return total>0?{acc:acc,total:total}:null;
}
function surfCat(wt){
  var m=/surface=([a-z_]+)/.exec(wt);var s=m?m[1]:"";
  var hm=/highway=([a-z_]+)/.exec(wt);var hw=hm?hm[1]:"";
  if(s==="asphalt"||s==="paved"||s==="concrete"||s==="paving_stones")return"asfalto";
  if(s==="compacted"||s==="fine_gravel"||s==="gravel"||s==="unpaved"||hw==="track")return"sterrato";
  if(s==="ground"||s==="dirt"||s==="grass"||s==="sand"||s==="mud")return"fondo naturale";
  if(s)return"altro";
  if(hw==="path"||hw==="footway")return"fondo naturale";
  return"asfalto";
}

function drawRouteProfile(){
  var c=document.getElementById("relev");if(!c||!rbTrack.length)return;
  var dpr=window.devicePixelRatio||1;c.width=c.offsetWidth*dpr;c.height=340;
  var ctx=c.getContext("2d");ctx.scale(dpr,dpr);var W=c.offsetWidth,H=170;
  var els=rbTrack.map(function(t){return t[2];}).filter(function(v){return v!=null;});
  if(els.length<2){ctx.fillStyle="#94a3b8";ctx.font="12px system-ui";ctx.fillText("Altimetria non disponibile",10,80);return;}
  var mn=Math.min.apply(null,els)-30,mx=Math.max.apply(null,els)+30;
  var cum=[0];for(var i=1;i<rbTrack.length;i++)cum.push(cum[i-1]+hav(rbTrack[i-1][0],rbTrack[i-1][1],rbTrack[i][0],rbTrack[i][1]));
  var tot=cum[cum.length-1]||1;
  var dk=document.body.classList.contains("dark");
  ctx.fillStyle=dk?"#1e293b":"#f8fafc";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=dk?"#334155":"#e2e8f0";ctx.lineWidth=0.5;ctx.font="10px system-ui";ctx.fillStyle=dk?"#64748b":"#94a3b8";
  for(var i=0;i<=4;i++){var y=15+(H-35)*(1-i/4);var el=Math.round(mn+(mx-mn)*i/4);ctx.beginPath();ctx.moveTo(38,y);ctx.lineTo(W-8,y);ctx.stroke();ctx.textAlign="right";ctx.fillText(el+"m",34,y+3);}
  ctx.beginPath();
  for(var i=0;i<rbTrack.length;i++){var e=rbTrack[i][2];if(e==null)continue;var x=38+(cum[i]/tot)*(W-46);var y=15+(H-35)*(1-(e-mn)/(mx-mn));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.strokeStyle="#22c55e";ctx.lineWidth=2.5;ctx.stroke();
  ctx.lineTo(W-8,H-20);ctx.lineTo(38,H-20);ctx.closePath();ctx.globalAlpha=0.12;ctx.fillStyle="#22c55e";ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle=dk?"#94a3b8":"#475569";ctx.textAlign="right";ctx.fillText(tot.toFixed(1)+" km",W-8,H-6);
}
function resetRoute(){rbStops=[];rbTrack=[];if(rbLine){map.removeLayer(rbLine);rbLine=null;}wpMarkers.forEach(function(m){map.removeLayer(m);});wpMarkers=[];updateRBList();document.getElementById("rb-info").innerHTML="";document.getElementById("rb-gpx").disabled=true;}
function generateGPX(){
  var now=new Date().toISOString();
  var g='<?xml version="1.0" encoding="UTF-8"?>\n<gpx xmlns="http://www.topografix.com/GPX/1/1" version="1.1" creator="LocaRide">\n<metadata><name>LocaRide Route</name><time>'+now+'</time></metadata>\n';
  rbStops.forEach(function(s){g+='<wpt lat="'+s.lat+'" lon="'+s.lon+'"><name>'+s.name+'</name>'+(s.elevation?'<ele>'+s.elevation+'</ele>':'')+'</wpt>\n';});
  g+='<trk><name>'+rbStops.map(function(s){return s.name;}).join(" - ")+'</name><trkseg>\n';
  rbTrack.forEach(function(c){g+='<trkpt lat="'+c[0].toFixed(6)+'" lon="'+c[1].toFixed(6)+'">'+(c[2]!=null?'<ele>'+Math.round(c[2])+'</ele>':'')+'</trkpt>\n';});
  g+='</trkseg></trk>\n</gpx>';return g;
}
function downloadGPX(){var g=generateGPX();var b=new Blob([g],{type:"application/gpx+xml"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="locaclimb_route.gpx";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

/* ===== USER CONTRIBUTIONS ===== */
function openReport(id){document.getElementById("rp-id").value=id;document.getElementById("rp-msg").style.display="none";document.getElementById("rp-txt").value="";document.getElementById("rp-name").value="";document.getElementById("rp-sub").disabled=false;document.getElementById("modal").classList.add("open");}
function closeModal(){document.getElementById("modal").classList.remove("open");}
function submitReport(){var txt=document.getElementById("rp-txt").value.trim();if(!txt){document.getElementById("rp-txt").style.borderColor="var(--err)";return;}document.getElementById("rp-sub").disabled=true;var msg=document.getElementById("rp-msg");msg.innerHTML="&#x2705; Grazie! Segnalazione in revisione.";msg.style.display="block";setTimeout(closeModal,2500);}

/* ===== FILTERS / SEARCH / DARK / EVENTS ===== */
function openFP(){document.getElementById("fp").classList.toggle("open");}
function closeFP(){document.getElementById("fp").classList.remove("open");}
function applyFilters(){var reg=document.getElementById("fr").value,diff=parseInt(document.getElementById("fd").value),sta=document.getElementById("fs").value,q=document.getElementById("search").value.toLowerCase();showOsm=document.getElementById("fosm").checked;var f=PASSES_DATA.filter(function(p){if(reg&&p.region!==reg)return false;if(p.difficulty<diff)return false;if(sta&&p.status!==sta)return false;if(q&&p.name.toLowerCase().indexOf(q)<0&&p.region.toLowerCase().indexOf(q)<0)return false;return true;});addMarkers(f);}
function resetFilters(){document.getElementById("fr").value="";document.getElementById("fd").value="1";document.getElementById("fdv").textContent="1";document.getElementById("fs").value="";document.getElementById("search").value="";document.getElementById("fosm").checked=true;showOsm=true;addMarkers(PASSES_DATA);}
function toggleBE(){var pn=document.getElementById("be-panel");pn.style.display=pn.style.display==="block"?"none":"block";if(pn.style.display!=="block")return;var now=new Date();var evts=BIKE_EVENTS.filter(function(e){return new Date(e.date)>=now;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,8);var h='<h3 style="margin:0 0 10px">&#x1F6B4; Prossimi Bike Day</h3>';if(!evts.length)h+='<p style="color:var(--txt2)">Nessun evento</p>';else evts.forEach(function(e){var d=new Date(e.date);var diff=Math.ceil((d-now)/86400000);h+='<div class="evt-card"><b>'+e.name+'</b><br>'+d.toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"long"});if(diff<=30)h+=' <b style="color:var(--err)">(tra '+diff+'gg!)</b>';h+='<br>'+e.hours+'</div>';});pn.innerHTML=h;}

/* ===== TRAFFIC HEATMAP ===== */
function pushLine(d,coords,w){if(!coords||coords.length<2)return;var step=Math.max(1,Math.round(coords.length/40));for(var i=0;i<coords.length;i+=step){d.push([coords[i][0],coords[i][1],w]);}}
function buildHeat(){
  var d=[];
  PASSES_DATA.forEach(function(p){p.versanti.forEach(function(v){
    var w=versTraffic(v,p).wkd/10;
    var key=v.startLat+","+v.startLon+">"+p.lat+","+p.lon;
    if(routeCache[key])pushLine(d,routeCache[key],w); // follow real road if baked
    else{var c=[];for(var t=0;t<=1;t+=0.05)c.push([v.startLat+(p.lat-v.startLat)*t,v.startLon+(p.lon-v.startLon)*t]);pushLine(d,c,w);}
  });});
  osmPasses.forEach(function(op){(op.versanti||[]).forEach(function(v){pushLine(d,v.track,(versTraffic(v,op).wkd)/10);});if(!(op.versanti&&op.versanti.length))d.push([op.lat,op.lon,(op.trafWeekend||4)/10]);});
  return d;
}
function toggleHeat(){
  if(typeof L.heatLayer==="undefined"){alert("Heatmap non disponibile (libreria non caricata)");return;}
  heatOn=!heatOn;document.getElementById("tb").classList.toggle("active",heatOn);
  if(heatOn){var data=buildHeat();if(!heatLayer)heatLayer=L.heatLayer(data,{radius:14,blur:18,max:1.0,minOpacity:0.3,gradient:{0.0:"#22c55e",0.4:"#f59e0b",0.7:"#ef4444",1.0:"#7f1d1d"}});else heatLayer.setLatLngs(data);heatLayer.addTo(map);}
  else if(heatLayer)map.removeLayer(heatLayer);
}
/* prefill OSRM route cache from baked file so curated passes don't hit OSRM at runtime */
function loadBakedRoutes(){fetch("routes_baked.json",{cache:"force-cache"}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(o){for(var k in o)routeCache[k]=o[k];}).catch(function(){});}

function adoptOsm(arr){
  if(!arr||!arr.length)return;
  // drop entries too close to curated passes
  osmPasses=arr.filter(function(op){return!PASSES_DATA.some(function(p){return Math.abs(p.lat-op.lat)<0.008&&Math.abs(p.lon-op.lon)<0.008;});});
  applyFilters();
  var b=document.getElementById("ob");if(b)b.textContent="OSM ("+osmPasses.length+")";
}
function persistOsm(){try{localStorage.setItem(OSM_CACHE_KEY,JSON.stringify(osmPasses.map(stripMarker)));}catch(e){}}
function stripMarker(op){var o={};for(var k in op){if(k!=="_marker")o[k]=op[k];}return o;}
function loadOsmBaked(){
  fetch("osm_passes.json",{cache:"no-store"}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(arr){adoptOsm(arr);}).catch(function(){
    try{var c=localStorage.getItem(OSM_CACHE_KEY);if(c){adoptOsm(JSON.parse(c));}}catch(e){}
  });
}
function classifyWay(t){
  if(!t)return null;var hw=t.highway;
  var bad={path:1,footway:1,steps:1,pedestrian:1,bridleway:1,corridor:1,construction:1,proposed:1,raceway:1,via_ferrata:1};
  if(!hw||bad[hw])return null;
  if(t.bicycle==="no"||t.bicycle==="dismount")return null;
  if(t.access==="private"||t.access==="no")return null;
  if(t["mtb:scale"])return null;
  var bs={sand:1,mud:1,rock:1,pebblestone:1,grass:1};
  if(t.surface&&bs[t.surface])return null;
  return {hw:hw,surface:t.surface||""};
}
function fetchOSM(){
  var btn=document.getElementById("ob");btn.textContent="Caricamento...";btn.disabled=true;
  // pass nodes + the highways they sit on, to filter hiking-only passes
  var q='[out:json][timeout:90];(node["mountain_pass"="yes"](44.0,6.5,47.5,13.5);)->.p;way(bn.p)["highway"];(.p;._;);out body;';
  fetch(OVERPASS+"?data="+encodeURIComponent(q))
  .then(function(r){return r.json();}).then(function(data){
    var nodes=[],ways=[];
    (data.elements||[]).forEach(function(el){if(el.type==="node"&&el.tags&&el.tags.mountain_pass)nodes.push(el);else if(el.type==="way")ways.push(el);});
    var wayByNode={};
    ways.forEach(function(w){if(!w.nodes)return;w.nodes.forEach(function(nid){(wayByNode[nid]=wayByNode[nid]||[]).push(w);});});
    var added=[],ct=0,skipped=0;
    nodes.forEach(function(el){
      var elev=el.tags.ele?parseInt(el.tags.ele):0;if(isNaN(elev)||elev<200)return;
      if(PASSES_DATA.some(function(p){return Math.abs(p.lat-el.lat)<0.008&&Math.abs(p.lon-el.lon)<0.008;}))return;
      if(osmPasses.some(function(p){return Math.abs(p.lat-el.lat)<0.005&&Math.abs(p.lon-el.lon)<0.005;}))return;
      var cw=wayByNode[el.id]||[],ride=null;
      for(var i=0;i<cw.length;i++){var c=classifyWay(cw[i].tags);if(c){ride=c;break;}}
      // if pass is on ways but none rideable -> hiking pass, skip
      if(cw.length>0&&!ride){skipped++;return;}
      var name=(el.tags.name||"Passo").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      var surfLabel=ride?surfaceLabelFromWay(ride.hw==="track"?{highway:"track",surface:ride.surface}:{surface:ride.surface||"asphalt"}):"";
      var op={id:"osm-"+el.id,name:name,lat:el.lat,lon:el.lon,elevation:elev,surfaceLabel:surfLabel};
      osmPasses.push(op);added.push(op);ct++;
    });
    added.forEach(addOsmMarker);persistOsm();
    btn.textContent="OSM (+"+ct+")";btn.disabled=false;
    if(skipped>0)showRSBrief("&#x2705; "+ct+" salite aggiunte ("+skipped+" passi escursionistici esclusi)");
  }).catch(function(){btn.textContent="OSM (err)";btn.disabled=false;});
}
function showRSBrief(msg){showRS(msg);setTimeout(hideRS,3500);}

  map.on("click",function(e){if(rbMode){addPointToRoute(e.latlng.lat,e.latlng.lng);}else{closeFP();}});
});
