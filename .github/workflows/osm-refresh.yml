name: Refresh OSM passes

# v3: Geofabrik PBF + osmium + Terrarium DEM. No Overpass, no rate limits.
# Builds osm_passes.json + curated_overrides.json + routes_baked.json and commits.

on:
  workflow_dispatch:
    inputs:
      reenrich:
        description: "Recompute versanti for ALL passes"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "17 4 1 * *"   # monthly

concurrency:
  group: osm-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install osmium + pngjs
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq osmium-tool
          npm init -y >/dev/null && npm install pngjs@7 --no-audit --no-fund

      - name: Build data (PBF + DEM)
        run: |
          node scripts/build_osm_passes.mjs \
            --out osm_passes.json \
            ${{ (github.event.inputs.reenrich == 'true') && '--reenrich' || '' }}

      - name: Bake curated routes
        run: node scripts/bake_routes.mjs --out routes_baked.json --data passes_data.js

      - name: Commit changes
        run: |
          git config user.name  "locaclimb-bot"
          git config user.email "actions@users.noreply.github.com"
          rm -rf build_tmp node_modules package.json package-lock.json
          if git diff --quiet -- osm_passes.json curated_overrides.json routes_baked.json; then
            echo "No changes"; exit 0
          fi
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('osm_passes.json')).length)")
          ENR=$(node -e "const a=JSON.parse(require('fs').readFileSync('osm_passes.json'));console.log(a.filter(p=>p.versanti&&p.versanti.length).length)")
          git add osm_passes.json curated_overrides.json routes_baked.json
          git commit -m "data: PBF+DEM build (${COUNT} passes, ${ENR} enriched)"
          git pull --rebase origin main
          git push
